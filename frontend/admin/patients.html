<div class="admin-main">
  <header class="admin-topbar">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menu"><span></span></button>
    <h1>Patients</h1>
    <div class="topbar-actions">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle color theme">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.4M12 19.1v2.4M4.4 4.4l1.7 1.7M17.9 17.9l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.4 19.6l1.7-1.7M17.9 6.1l1.7-1.7"/></svg>
      </button>
      <span class="admin-user"><span class="dot"></span><span id="adminEmail">—</span></span>
      <button class="btn btn-ghost btn-sm" id="logoutBtn" type="button">Log out</button>
    </div>
  </header>

  <main class="admin-content">
    <div class="page-head-row">
      <div>
        <h2>Patient directory</h2>
        <p>Read-only view of registered patients and their Aarogyam ID.</p>
      </div>
    </div>

    <div class="toolbar">
      <input type="search" id="patientSearch" placeholder="Search by name…" style="min-width:280px">
    </div>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr><th>Aarogyam ID</th><th>Name</th><th>DOB</th><th>Gender</th><th>Blood group</th><th>Registered</th><th></th></tr>
        </thead>
        <tbody id="patientsBody"><tr><td colspan="7" class="table-loading">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="patientModal" hidden>
  <div class="modal">
    <div class="modal-head">
      <h3 id="pmName">Patient</h3>
      <button class="modal-close" id="pmClose" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="detail-grid" id="pmGrid"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" id="pmCloseBtn" type="button">Close</button>
    </div>
  </div>
</div>

<div id="toastHost"></div>

<script src="admin-core.js"></script>
<script>
  (function () {
    "use strict";

    var user = AdminSession.requireAdminAuth();
    if (!user) return;
    AdminShell.init(user);

    var esc = AdminUtil.escapeHtml;
    var lookups = { countries: {}, states: {}, cities: {} };
    var allPatients = [];
    var searchTimer = null;

    var tbody = document.getElementById("patientsBody");
    var searchInput = document.getElementById("patientSearch");
    var modal = document.getElementById("patientModal");
    var pmName = document.getElementById("pmName");
    var pmGrid = document.getElementById("pmGrid");

    function buildLookup(rows, idField, nameField) {
      var map = {};
      rows.forEach(function (r) { map[r[idField]] = r[nameField]; });
      return map;
    }

    function render() {
      if (!allPatients.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="table-empty">No patients found.</td></tr>';
        return;
      }
      tbody.innerHTML = allPatients.map(function (p) {
        var name = [p.firstName, p.middleName, p.lastName].filter(Boolean).join(" ");
        return "<tr>" +
          '<td class="mono">' + esc(p.aarogyamId) + "</td>" +
          "<td><div class=\"row-title\">" + esc(name) + "</div></td>" +
          "<td>" + AdminUtil.formatDate(p.dateOfBirth) + "</td>" +
          "<td>" + esc(p.gender) + "</td>" +
          "<td>" + esc(p.bloodGroup || "—") + "</td>" +
          "<td>" + AdminUtil.formatDate(p.createdAt) + "</td>" +
          '<td class="actions"><button class="btn btn-ghost btn-sm" data-view="' + p.patientId + '">View</button></td>' +
        "</tr>";
      }).join("");

      tbody.querySelectorAll("[data-view]").forEach(function (btn) {
        btn.addEventListener("click", function () { openPatient(Number(btn.getAttribute("data-view"))); });
      });
    }

    function loadPatients(searchName) {
      tbody.innerHTML = '<tr><td colspan="7" class="table-loading">Loading…</td></tr>';
      AdminAPI.listPatients(searchName).then(function (rows) {
        allPatients = rows;
        render();
      }).catch(function (err) {
        tbody.innerHTML = '<tr><td colspan="7" class="table-empty">' + esc(err.message) + "</td></tr>";
      });
    }

    searchInput.addEventListener("input", function () {
      clearTimeout(searchTimer);
      var term = searchInput.value.trim();
      searchTimer = setTimeout(function () { loadPatients(term); }, 300);
    });

    function detailRow(label, value, full) {
      return '<div class="' + (full ? "full" : "") + '"><div class="dl">' + esc(label) + '</div><div class="dv">' + value + "</div></div>";
    }

    function openPatient(patientId) {
      pmName.textContent = "Loading…";
      pmGrid.innerHTML = "";
      modal.hidden = false;

      AdminAPI.getPatient(patientId).then(function (p) {
        var name = [p.firstName, p.middleName, p.lastName].filter(Boolean).join(" ");
        pmName.textContent = name;

        var addressLine = [p.address, lookups.cities[p.cityId], lookups.states[p.stateId], lookups.countries[p.countryId]]
          .filter(Boolean).join(", ");

        var html = "";
        html += detailRow("Aarogyam ID", '<span class="mono">' + esc(p.aarogyamId) + "</span>");
        html += detailRow("Date of birth", AdminUtil.formatDate(p.dateOfBirth));
        html += detailRow("Gender", esc(p.gender));
        html += detailRow("Blood group", esc(p.bloodGroup || "—"));
        html += detailRow("Emergency contact", esc(p.emergencyContact || "—"));
        html += detailRow("Registered", AdminUtil.formatDate(p.createdAt));
        html += detailRow("Address", esc(addressLine || "—"), true);
        pmGrid.innerHTML = html;
      }).catch(function (err) {
        pmName.textContent = "Error";
        pmGrid.innerHTML = '<div class="full"><div class="dv">' + esc(err.message) + "</div></div>";
      });
    }

    function closeModal() { modal.hidden = true; }
    document.getElementById("pmClose").addEventListener("click", closeModal);
    document.getElementById("pmCloseBtn").addEventListener("click", closeModal);
    modal.addEventListener("click", function (e) { if (e.target === modal) closeModal(); });

    Promise.all([
      AdminAPI.master("countries").list(),
      AdminAPI.master("states").list(),
      AdminAPI.master("cities").list()
    ]).then(function (res) {
      lookups.countries = buildLookup(res[0], "countryId", "countryName");
      lookups.states = buildLookup(res[1], "stateId", "stateName");
      lookups.cities = buildLookup(res[2], "cityId", "cityName");
    }).catch(function () {});

    loadPatients();

    AdminAPI.dashboardStats().then(function (stats) {
      if (stats.pendingDoctorApprovals > 0) {
        var el = document.getElementById("navPendingCount");
        el.textContent = stats.pendingDoctorApprovals;
        el.hidden = false;
      }
    }).catch(function () {});
  })();
</script>
</body>
</html>
