services:
  api:
    image: ${API_IMAGE:-ghcr.io/OWNER/aarogyam-api:latest}
    build:
      context: ./backend/Aarogyam.API
    restart: unless-stopped
    ports:
      - "5027:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__AarogyamDb: ${DB_CONNECTION_STRING}
      Email__SmtpHost: ${SMTP_HOST}
      Email__SmtpPort: ${SMTP_PORT}
      Email__SenderEmail: ${SMTP_SENDER_EMAIL}
      Email__SenderPassword: ${SMTP_SENDER_PASSWORD}
      Email__SenderName: Aarogyam
      Jwt__Issuer: AarogyamAPI
      Jwt__Audience: AarogyamClient
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__ExpiryMinutes: 60
    networks:
      - aarogyam-net
      # The existing SQL Server container isn't managed by this file. Either
      # attach this service to whatever network that container is already on
      # (uncomment sqlserver-net below and set SQLSERVER_NETWORK_NAME), or
      # point DB_CONNECTION_STRING at a host/port this container can reach.
      # - sqlserver-net

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/OWNER/aarogyam-frontend:latest}
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - aarogyam-net

networks:
  aarogyam-net:
    driver: bridge
  # sqlserver-net:
  #   external: true
  #   name: ${SQLSERVER_NETWORK_NAME}
